name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm deps
        run: npm ci || npm install

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          fi

          {
            echo "## ${GITHUB_REF_NAME#v} - $(date +%Y-%m-%d)"
            echo ""

            ADDED=$(git log $RANGE --pretty=format:'- %s' --grep='^feat' || true)
            if [ -n "$ADDED" ]; then
              echo "### Added"
              echo "$ADDED" | sed 's/feat[^:]*: //'
              echo ""
            fi

            FIXED=$(git log $RANGE --pretty=format:'- %s' --grep='^fix' || true)
            if [ -n "$FIXED" ]; then
              echo "### Fixed"
              echo "$FIXED" | sed 's/fix[^:]*: //'
              echo ""
            fi

            CHANGED=$(git log $RANGE --pretty=format:'- %s' --grep='^refactor\|^chore' || true)
            if [ -n "$CHANGED" ]; then
              echo "### Changed"
              echo "$CHANGED" | sed 's/\(refactor\|chore\)[^:]*: //'
              echo ""
            fi

            PERF=$(git log $RANGE --pretty=format:'- %s' --grep='^perf' || true)
            if [ -n "$PERF" ]; then
              echo "### Performance"
              echo "$PERF" | sed 's/perf[^:]*: //'
              echo ""
            fi

            DOCS=$(git log $RANGE --pretty=format:'- %s' --grep='^docs' || true)
            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo "$DOCS" | sed 's/docs[^:]*: //'
              echo ""
            fi
          } > release_notes.md

          cat release_notes.md

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Flux Explorer ${{ github.ref_name }}'
          releaseBodyPath: release_notes.md
          releaseDraft: false
          prerelease: false
